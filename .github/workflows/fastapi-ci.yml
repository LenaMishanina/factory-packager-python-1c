name: FastAPI CI

on:
  push:
    paths:
      - "FastApiPlc/**"
      - ".github/workflows/fastapi-ci.yml"
  pull_request:
    paths:
      - "FastApiPlc/**"
      - ".github/workflows/fastapi-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FastApiPlc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: FastApiPlc/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: FastApiPlc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker image
        run: docker compose build
